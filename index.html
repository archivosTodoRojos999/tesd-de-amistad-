<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Preguntados - Juego de Preguntas</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #4e54c8, #8f94fb);
    margin: 0;
    padding: 20px;
    color: #fff;
  }
  h1 {
    text-align: center;
  }
  #score {
    font-size: 1.2em;
    margin: 10px 0;
  }
  #question-container {
    max-width: 800px;
    margin: auto;
    background: rgba(255,255,255,0.2);
    padding: 20px;
    border-radius: 15px;
  }
  #question {
    font-size: 1.5em;
    margin-bottom: 20px;
  }
  .answer-btn {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 15px;
    font-size: 1.2em;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background-color: #fff;
    color: #333;
    transition: background 0.3s;
  }
  .answer-btn:hover {
    background-color: #ddd;
  }
  #nextBtn {
    display: none;
    margin: 20px auto;
    padding: 15px 30px;
    font-size: 1.2em;
    border: none;
    border-radius: 10px;
    background-color: #28a745;
    color: #fff;
    cursor: pointer;
  }
  #nextBtn:hover {
    background-color: #218838;
  }
</style>
</head>
<body>

<h1>Preguntados - Juego de Preguntas</h1>
<div id="score">Puntuación: 0</div>
<div id="question-container">
  <div id="question">Cargando pregunta...</div>
  <button class="answer-btn" id="answer0" onclick="selectAnswer(0)"></button>
  <button class="answer-btn" id="answer1" onclick="selectAnswer(1)"></button>
  <button class="answer-btn" id="answer2" onclick="selectAnswer(2)"></button>
  <button class="answer-btn" id="answer3" onclick="selectAnswer(3)"></button>
  <button id="nextBtn" onclick="nextQuestion()">Siguiente</button>
</div>

<script>
const preguntas = [
  {
    pregunta: "¿Cuál es la capital de Francia?",
    respuestas: ["Madrid", "París", "Londres", "Roma"],
    correcta: 1
  },
  {
    pregunta: "¿Qué elemento tiene el símbolo químico 'O'?",
    respuestas: ["Oxígeno", "Oro", "Ozono", "Oxalato"],
    correcta: 0
  },
  {
    pregunta: "¿En qué año llegó el hombre a la Luna por primera vez?",
    respuestas: ["1969", "1972", "1959", "1980"],
    correcta: 0
  },
  {
    pregunta: "¿Cuál es el idioma más hablado del mundo?",
    respuestas: ["Inglés", "Chino mandarín", "Español", "Hindú"],
    correcta: 1
  },
  {
    pregunta: "¿Qué planeta es conocido como el planeta rojo?",
    respuestas: ["Venus", "Marte", "Júpiter", "Saturno"],
    correcta: 1
  }
];

let currentIndex = 0;
let puntuacion = 0;
let respuestaSeleccionada = null;

const questionEl = document.getElementById('question');
const answerButtons = [
  document.getElementById('answer0'),
  document.getElementById('answer1'),
  document.getElementById('answer2'),
  document.getElementById('answer3')
];
const nextBtn = document.getElementById('nextBtn');
const scoreEl = document.getElementById('score');

function cargarPregunta() {
  const pregunta = preguntas[currentIndex];
  questionEl.innerText = pregunta.pregunta;
  for (let i=0; i<4; i++) {
    answerButtons[i].innerText = pregunta.respuestas[i];
    answerButtons[i].style.backgroundColor = '#fff';
    answerButtons[i].disabled = false;
  }
  nextBtn.style.display = 'none';
  respuestaSeleccionada = null;
}

function selectAnswer(index) {
  // Resalta la respuesta seleccionada
  for (let i=0; i<4; i++) {
    answerButtons[i].style.backgroundColor = '#fff';
  }
  answerButtons[index].style.backgroundColor = '#007bff';
  respuestaSeleccionada = index;
  // Habilitar botón Siguiente
  document.getElementById('nextBtn').style.display='block';
}

function nextQuestion() {
  const pregunta = preguntas[currentIndex];
  if (respuestaSeleccionada === null) return; // sin respuesta

  // Ver si fue correcta
  if (respuestaSeleccionada === pregunta.correcta) {
    answerButtons[respuestaSeleccionada].style.backgroundColor = 'green';
    puntuacion++;
  } else {
    answerButtons[respuestaSeleccionada].style.backgroundColor = 'red';
    answerButtons[pregunta.correcta].style.backgroundColor = 'green';
  }

  // Deshabilitar botones
  for (let btn of answerButtons) {
    btn.disabled = true;
  }

  // Actualizar puntaje
  scoreEl.innerText = 'Puntuación: ' + puntuacion;

  // Preparar para la siguiente
  currentIndex++;
  if (currentIndex < preguntas.length) {
    setTimeout(cargarPregunta, 1500);
  } else {
    setTimeout(finJuego, 1500);
  }
}

function finJuego() {
  questionEl.innerText = '¡Juego terminado! Tu puntuación final es ' + puntuacion + '/' + preguntas.length;
  for (let btn of answerButtons) {
    btn.style.display='none';
  }
  document.getElementById('nextBtn').style.display='none';
}

window.onload = () => {
  cargarPregunta();
};
</script>

</body>
</html>
