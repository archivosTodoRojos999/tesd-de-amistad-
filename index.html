<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ENDEX UI Simulation</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ffcc;
    font-family: monospace;
    overflow: hidden;
}

.terminal {
    padding: 20px;
    height: 100vh;
}

.line {
    margin-bottom: 8px;
}

.cursor::after {
    content: "|";
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

/* Glitch */
.glitch {
    color: #ff00ff;
    animation: glitch 0.2s infinite;
}

@keyframes glitch {
    0% { transform: translate(1px, -1px); }
    50% { transform: translate(-1px, 1px); }
    100% { transform: translate(0, 0); }
}

/* Grid fondo */
.grid {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40%;
    background: repeating-linear-gradient(
        to top,
        rgba(128,0,255,0.2) 0px,
        rgba(128,0,255,0.2) 2px,
        transparent 2px,
        transparent 20px
    );
    transform: perspective(400px) rotateX(60deg);
}
</style>
</head>

<body>

<div class="terminal" id="terminal"></div>
<div class="grid"></div>

<!-- sonido -->
<audio id="typeSound" src="https://www.soundjay.com/mechanical/keyboard-1.mp3"></audio>

<script>
const lines = [
    "Initializing ENDEX_UI...",
    "Connecting to secure server...",
    "Access granted ✔",
    "Loading modules...",
    "Decrypting data...",
    "System override enabled",
    "WARNING: Unauthorized access detected",
    "Bypassing firewall...",
    "ENDEX CORE ACTIVE"
];

let terminal = document.getElementById("terminal");
let sound = document.getElementById("typeSound");

let lineIndex = 0;
let charIndex = 0;
let currentLineDiv;

function typeEffect() {
    if (lineIndex >= lines.length) return;

    if (charIndex === 0) {
        currentLineDiv = document.createElement("div");
        currentLineDiv.classList.add("line", "cursor");

        if (Math.random() > 0.7) {
            currentLineDiv.classList.add("glitch");
        }

        terminal.appendChild(currentLineDiv);
    }

    let text = lines[lineIndex];

    if (charIndex < text.length) {
        currentLineDiv.textContent += text.charAt(charIndex);
        charIndex++;

        // sonido (reinicia para que suene seguido)
        sound.currentTime = 0;
        sound.play();

        setTimeout(typeEffect, 40);
    } else {
        currentLineDiv.classList.remove("cursor");
        lineIndex++;
        charIndex = 0;
        setTimeout(typeEffect, 500);
    }
}

// iniciar al hacer click (necesario para que el sonido funcione)
document.body.addEventListener("click", () => {
    typeEffect();
}, { once: true });

</script>

</body>
</html>
