<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Calibrador de Sensibilidad</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #e60000;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background-color: #e60000;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #cc0000;
        }
        .resultado {
            margin-top: 20px;
            padding: 15px;
            background-color: #ffe6e6;
            border: 1px solid #e60000;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Calibrador de Sensibilidad</h2>
        <form id="calibrarForm">
            <label for="marca">Marca:</label>
            <input type="text" id="marca" placeholder="Ejemplo: Samsung" required />

            <label for="modelo">Modelo:</label>
            <input type="text" id="modelo" placeholder="Ejemplo: Galaxy S21" required />

            <button type="button" onclick="calibrarSensibilidad()">Generar Sensibilidad</button>
        </form>
        <div class="resultado" id="resultado"></div>
    </div>

    <script>
        function calibrarSensibilidad() {
            const marca = document.getElementById('marca').value;
            const modelo = document.getElementById('modelo').value;

            // Aquí puedes agregar la lógica para calcular la sensibilidad.
            // Como ejemplo, usaremos valores ficticios o una fórmula simple.

            // Ejemplo: Sensibilidad basada en la longitud del nombre de la marca y modelo
            const sensibilidadGeneral = Math.min(200, marca.length * 10 + modelo.length * 5);
            const sensibilidadPuntoRojo = sensibilidadGeneral - 10;
            const sensibilidadMiraX2 = sensibilidadGeneral - 20;
            const sensibilidadMiraX4 = sensibilidadGeneral - 30;
            const tamañoBoton = Math.max(10, sensibilidadGeneral / 10);
            const precision = 100 - sensibilidadGeneral;

            const resultadoDiv = document.getElementById('resultado');
            resultadoDiv.innerHTML = `
                <h3>Configuración para ${marca} ${modelo}</h3>
                <p>Sensibilidad General: ${sensibilidadGeneral}</p>
                <p>Sensibilidad de Punto Rojo: ${sensibilidadPuntoRojo}</p>
                <p>Sensibilidad Mira X2: ${sensibilidadMiraX2}</p>
                <p>Sensibilidad Mira X4: ${sensibilidadMiraX4}</p>
                <p>Tamaño del Botón: ${tamañoBoton}</p>
                <p>Precisión: ${precision}</p>
            `;
        }
    </script>
</body>
</html>
