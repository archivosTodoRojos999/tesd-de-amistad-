<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego de Autos</title>

<style>
body{
margin:0;
background:#111;
overflow:hidden;
font-family:monospace;
color:white;
text-align:center;
}

canvas{
background:#333;
display:block;
margin:auto;
}
</style>
</head>

<body>

<h2>🚗 Esquiva los autos</h2>
<p>⬅️➡️ mover | ⬆️ acelerar</p>

<canvas id="game" width="400" height="600"></canvas>

<!-- sonido de motor -->
<audio id="engine" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3c2f8b08a3.mp3">
</audio>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")
const engine = document.getElementById("engine")

let player = {
x:180,
y:500,
w:40,
h:80,
speed:6
}

let cars = []
let score = 0
let gameSpeed = 4

let keys = {}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function spawnCar(){

let lane = Math.floor(Math.random()*3)
let x = 80 + lane*120

cars.push({
x:x,
y:-100,
w:40,
h:80,
speed:gameSpeed
})

}

setInterval(spawnCar,1000)

function update(){

if(keys["ArrowLeft"]) player.x -= player.speed
if(keys["ArrowRight"]) player.x += player.speed

// acelerar
if(keys["ArrowUp"]){

gameSpeed += 0.02

engine.play().catch(()=>{})

}else{

engine.pause()

}

if(player.x<40) player.x=40
if(player.x>320) player.x=320

cars.forEach(car=>{

car.y += car.speed

if(
player.x < car.x + car.w &&
player.x + player.w > car.x &&
player.y < car.y + car.h &&
player.y + player.h > car.y
){
alert("💥 Chocaste! Puntaje: "+score)
location.reload()
}

})

cars = cars.filter(car=>car.y < canvas.height+100)

score++

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

/* carretera */

ctx.fillStyle="#444"
ctx.fillRect(0,0,400,600)

/* lineas */

ctx.strokeStyle="white"
ctx.setLineDash([20,15])
ctx.lineWidth=4

ctx.beginPath()
ctx.moveTo(133,0)
ctx.lineTo(133,600)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(266,0)
ctx.lineTo(266,600)
ctx.stroke()

ctx.setLineDash([])

/* auto jugador */

ctx.fillStyle="lime"
ctx.fillRect(player.x,player.y,player.w,player.h)

/* autos enemigos */

ctx.fillStyle="red"

cars.forEach(car=>{
ctx.fillRect(car.x,car.y,car.w,car.h)
})

/* puntaje */

ctx.fillStyle="white"
ctx.fillText("Puntos: "+score,10,20)

ctx.fillText("Velocidad: "+gameSpeed.toFixed(1),10,40)

}

function gameLoop(){

update()
draw()
requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
