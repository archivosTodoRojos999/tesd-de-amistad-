<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- 🔒 SIN ZOOM -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>SENCI PRO</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: monospace;
  background: black;
  color: #00eaff;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Fondo */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* Caja */
.box {
  width: 95%;
  max-width: 400px;
  padding: 18px;
  border: 2px solid #00eaff;
  background: rgba(0,0,0,0.9);
  box-shadow: 0 0 25px #00eaff;
}

/* Inputs y botones */
input, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  background: black;
  border: 1px solid #00eaff;
  color: #00eaff;
  font-size: 14px;
}

/* Botones rango */
.range {
  display: flex;
  gap: 5px;
}

.range button.active {
  background: #00eaff;
  color: black;
}

/* Panel */
.panel {
  margin-top: 12px;
  border: 1px solid #00eaff;
  padding: 12px;
  font-size: 13px;
  text-align: left;
  box-shadow: 0 0 15px #00eaff inset;
  min-height: 180px;
}

/* Segunda pantalla */
#panel2 {
  display: none;
}

/* Loader */
#loader {
  display: none;
}

/* Botones abajo */
.actions {
  display: flex;
  gap: 5px;
}

/* Hover */
button:hover {
  background: #00eaff;
  color: black;
}

/* Vista dividida en PC */
@media (min-width: 600px) {
  #panel, #panel2 {
    width: 48%;
    display: inline-block;
    vertical-align: top;
  }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="box">

<h2>⚡ SENCI PRO SALITA</h2>

<input id="marca" placeholder="Marca del dispositivo">
<input id="modelo" placeholder="Modelo del dispositivo">

<div class="range">
  <button id="alta">ALTA</button>
  <button id="media">MEDIA</button>
  <button id="baja">BAJA</button>
</div>

<div class="panel" id="panel">
=== ESPERANDO DATOS ===
</div>

<!-- 🔥 LOADER -->
<div id="loader">
  <div style="border:1px solid #00eaff; padding:10px; text-align:center;">
    ⚡ GENERANDO SENCI...
    <div style="height:6px; background:#003; margin-top:10px; overflow:hidden;">
      <div id="bar" style="height:100%; width:0%; background:#00eaff;"></div>
    </div>
  </div>
</div>

<!-- 🔥 SEGUNDA PANTALLA -->
<div id="panel2" class="panel"></div>

<div class="actions">
  <button onclick="generar(true)">CON DPI</button>
  <button onclick="generar(false)">SIN DPI</button>
</div>

</div>

<script>
let rango = "";

document.getElementById("alta").onclick = () => select("ALTA");
document.getElementById("media").onclick = () => select("MEDIA");
document.getElementById("baja").onclick = () => select("BAJA");

function select(r) {
  rango = r;
  document.querySelectorAll(".range button").forEach(b=>b.classList.remove("active"));
  document.getElementById(r.toLowerCase()).classList.add("active");
}

/* 🔥 GENERADOR CON ANIMACIÓN */
function generar(dpi) {
  let marca = document.getElementById("marca").value;
  let modelo = document.getElementById("modelo").value;

  if (!marca || !modelo || !rango) {
    document.getElementById("panel").innerHTML = "⚠️ COMPLETA TODO";
    return;
  }

  const loader = document.getElementById("loader");
  const bar = document.getElementById("bar");
  const panel2 = document.getElementById("panel2");

  loader.style.display = "block";
  panel2.style.display = "none";
  bar.style.width = "0%";

  let progreso = 0;

  let intervalo = setInterval(() => {
    progreso += 5;
    bar.style.width = progreso + "%";

    if (progreso >= 100) {
      clearInterval(intervalo);
      loader.style.display = "none";
      panel2.style.display = "block";

      let base = marca.length * modelo.length;
      let mult = rango === "ALTA" ? 1.15 : rango === "MEDIA" ? 1.05 : 0.95;

      function precision(min, max, peso) {
        let centro = (min + max) / 2;
        let variacion = (base % peso) - (peso / 2);
        let valor = centro + variacion * 0.3;
        return Math.round(Math.max(min, Math.min(valor, max)));
      }

      const sens = {
        general: precision(150, 190, 30) * mult,
        red: precision(120, 170, 20) * mult,
        x2: precision(110, 160, 18) * mult,
        x4: precision(100, 150, 15) * mult,
        boton: precision(45, 70, 10)
      };

      for (let key in sens) {
        sens[key] = Math.round(sens[key]);
      }

      panel2.innerHTML = `
=== SENCI GENERADA ===<br>
RANGO : ${rango}<br>
MODO : ${dpi ? "CON DPI" : "SIN DPI"}<br>
-----------------------<br>
DISPOSITIVO : ${modelo}<br>
MARCA : ${marca}<br>
-----------------------<br>
GENERAL : ${sens.general}%<br>
PUNTO ROJO : ${sens.red}%<br>
MIRA X2 : ${sens.x2}%<br>
MIRA X4 : ${sens.x4}%<br>
BOTON DISP : ${sens.boton}%<br>
DPI : ${dpi ? "411" : "DEFAULT"}<br>
🎯 HEADSHOT PRO
`;
    }
  }, 50);
}

/* 🔵 Fondo animado */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();

let lines = Array.from({length:30},()=>({
  x: Math.random()*canvas.width,
  y: Math.random()*canvas.height,
  angle: Math.random()*6,
  len: 150
}));

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.3)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle="#00eaff";
  ctx.shadowBlur=15;
  ctx.shadowColor="#00eaff";

  lines.forEach(l=>{
    ctx.beginPath();
    ctx.moveTo(l.x,l.y);
    ctx.lineTo(l.x+Math.cos(l.angle)*l.len, l.y+Math.sin(l.angle)*l.len);
    ctx.stroke();

    l.angle+=0.02;
  });

  requestAnimationFrame(draw);
}
draw();

window.addEventListener("resize", resize);
</script>

</body>
</html>
