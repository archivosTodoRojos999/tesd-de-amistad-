<script>
    let juegoActivo = false;
    let enAuto = false;
    let enCasa = false;

    let camaraPos = { x: 50, y: 50 };
    let autoSeleccionado = 0;

    const autos = document.querySelectorAll('.auto');
    const autoPos = [30, 50, 70];

    const camaraPeaton = document.getElementById('camara-peaton');
    const camaraAuto = document.getElementById('camara-auto');
    const camaraInterior = document.getElementById('camara-interior');

    const inicio = document.getElementById('pantalla-inicio');
    const juego = document.getElementById('pantalla-juego');

    let ubicacion = "San Fierro - Zona Sur";

    function actualizarCamara() {
        camaraPeaton.style.backgroundPosition = `${camaraPos.x}% ${camaraPos.y}%`;
    }

    function moverCamara(dx, dy) {
        camaraPos.x += dx;
        camaraPos.y += dy;

        camaraPos.x = Math.max(0, Math.min(100, camaraPos.x));
        camaraPos.y = Math.max(0, Math.min(100, camaraPos.y));

        actualizarCamara();
    }

    function moverPersonaje(dx, dy) {
        if (!juegoActivo || enAuto) return;
        moverCamara(dx, dy);
    }

    function toggleAuto() {
        enAuto = !enAuto;
        enCasa = false;

        camaraPeaton.style.display = enAuto ? "none" : "block";
        camaraAuto.style.display = enAuto ? "block" : "none";
        camaraInterior.style.display = "none";

        document.getElementById('sonido-puerta-sa').play();
        document.getElementById('sonido-motor-sa')[enAuto ? "play" : "pause"]();

        actualizarCamara();
    }

    function moverAuto() {
        if (!enAuto) return;

        autoPos[autoSeleccionado] += 2;
        autos[autoSeleccionado].style.left = autoPos[autoSeleccionado] + "%";
    }

    function toggleCasa() {
        enCasa = !enCasa;
        enAuto = false;

        if (enCasa) {
            ubicacion = "Interior de casa";
            camaraPeaton.style.display = "none";
            camaraAuto.style.display = "none";
            camaraInterior.style.display = "block";
        } else {
            ubicacion = "San Fierro - Zona Sur";
            camaraPeaton.style.display = "block";
            camaraInterior.style.display = "none";
        }

        document.getElementById('ubicacion').textContent = ubicacion;
        document.getElementById('sonido-puerta-sa').play();
    }

    document.getElementById('btn-iniciar').onclick = () => {
        inicio.style.display = "none";
        juego.style.display = "block";
        juegoActivo = true;

        document.getElementById('sonido-calle').play();
        actualizarCamara();
    };

    document.getElementById('btn-cam-izq').onclick = () => moverCamara(-3, 0);
    document.getElementById('btn-cam-der').onclick = () => moverCamara(3, 0);

    document.getElementById('btn-entrar-auto').onclick = toggleAuto;
    document.getElementById('btn-bajar-auto').onclick = toggleAuto;
    document.getElementById('btn-mover-auto').onclick = moverAuto;
    document.getElementById('btn-entrar-casa').onclick = toggleCasa;

    document.addEventListener("keydown", (e) => {
        if (!juegoActivo) return;

        switch(e.key.toLowerCase()) {
            case "arrowleft":
            case "a":
                moverPersonaje(-2, 0);
                break;
            case "arrowright":
            case "d":
                moverPersonaje(2, 0);
                break;
            case "arrowup":
            case "w":
                moverPersonaje(0, 2);
                break;
            case "arrowdown":
            case "s":
                moverPersonaje(0, -2);
                break;
            case "e":
                toggleAuto();
                break;
            case "c":
                toggleCasa();
                break;
            case "m":
                autoSeleccionado = (autoSeleccionado + 1) % autos.length;
                document.getElementById('auto-actual').textContent =
                    ['Fiat Uno', 'VW Saveiro', 'Chevrolet Corsa'][autoSeleccionado];
                break;
            case "f":
                document.getElementById('sonido-pistola').play();
                break;
        }
    });
</script>
</body>
</html>
