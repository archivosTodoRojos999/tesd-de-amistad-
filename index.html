<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escuela Marcelino H Blanco</title>

<style>

html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:Arial;
background:black;
color:white;
}

#video{
position:relative;
width:100%;
height:100vh;
}

#imagen{
width:100%;
height:100%;
object-fit:cover;
transition:opacity 1.5s, transform 6s;
}

#overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
}

#titulo{
position:absolute;
top:40px;
left:50%;
transform:translateX(-50%);
font-size:40px;
font-weight:bold;
letter-spacing:2px;
}

#subtitulo{
position:absolute;
bottom:60px;
left:50%;
transform:translateX(-50%);
width:70%;
text-align:center;
font-size:26px;
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:10px;
}

#logo{
position:absolute;
top:20px;
left:20px;
display:flex;
align-items:center;
gap:10px;
background:rgba(0,0,0,0.6);
padding:8px 14px;
border-radius:14px;
}

#logo img{
width:70px;
height:70px;
object-fit:contain;
background:white;
padding:5px;
border-radius:50%;
}

#logo span{
font-weight:bold;
}

#boton{
position:absolute;
bottom:20px;
right:20px;
padding:14px 24px;
font-size:18px;
border:none;
border-radius:10px;
background:#00c3ff;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div id="video">

<img id="imagen" src="https://images.unsplash.com/photo-1580582932707-520aed937b7b">

<div id="overlay"></div>

<div id="titulo">
Escuela Marcelino H Blanco
</div>

<div id="logo">
<img src="logo.png">
<span>La Paz</span>
</div>

<div id="subtitulo">
Presiona iniciar para comenzar
</div>

<button id="boton" onclick="iniciar()">▶ Iniciar</button>

</div>

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

let imagenes=[
"https://images.unsplash.com/photo-1580582932707-520aed937b7b",
"https://images.unsplash.com/photo-1596495578065-6e0763fa1178",
"https://images.unsplash.com/photo-1503676260728-1c00da094a0b",
"https://images.unsplash.com/photo-1509062522246-3755977927d7",
"https://images.unsplash.com/photo-1523240795612-9a054b0db644"
];

/* PROMPT PARA ALUMNOS DE 1° AÑO */

let textos=[

"Hola chicos. Bienvenidos a la Escuela Número 4 042 Marcelino H Blanco. Si estás en primer año de secundaria, este es el comienzo de una nueva etapa en tu vida.",

"Sabemos que al principio todo puede parecer nuevo. Nuevas materias, nuevos profesores y nuevos compañeros.",

"Pero no se preocupen. Poco a poco van a ir aprendiendo, adaptándose y descubriendo todo lo que esta escuela tiene para ofrecer.",

"Aquí van a hacer nuevos amigos, aprender cosas interesantes y vivir muchas experiencias que los van a ayudar a crecer.",

"Un consejo muy importante: no tengan miedo de preguntar, participar en clase y trabajar en equipo con sus compañeros.",

"La secundaria es un lugar para aprender, pero también para compartir, divertirse y prepararse para el futuro.",

"Les deseamos un gran comienzo en primer año. Bienvenidos a la Escuela Marcelino H Blanco. ¡Que tengan un excelente año!"

];

let i=0;

function iniciar(){

document.getElementById("boton").style.display="none";

let musica=document.getElementById("musica");
musica.volume=0.25;
musica.play();

escena();

}

function escena(){

if(i>=textos.length)return;

let img=document.getElementById("imagen");
let subt=document.getElementById("subtitulo");

img.style.opacity=0;

setTimeout(()=>{

img.src=imagenes[i];
img.style.opacity=1;
img.style.transform="scale(1.08)";

subt.innerText=textos[i];

leer(textos[i]);

},800);

}

function leer(texto){

speechSynthesis.cancel();

let voz=new SpeechSynthesisUtterance(texto);

voz.lang="es-ES";
voz.rate=1;
voz.pitch=1;

voz.onend=function(){

i++;

setTimeout(escena,1000);

};

speechSynthesis.speak(voz);

}

</script>

</body>
</html>
