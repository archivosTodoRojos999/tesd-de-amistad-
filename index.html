<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sobrevivir a la Escuela Marcelino Blanco</title>

<style>

body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

h1{
padding:20px;
}

#video{
width:800px;
max-width:90%;
margin:auto;
position:relative;
}

#imagen{
width:100%;
height:450px;
object-fit:cover;
border-radius:10px;
}

#subtitulo{
position:absolute;
bottom:20px;
left:0;
right:0;
font-size:22px;
background:rgba(0,0,0,0.5);
padding:10px;
}

button{
margin-top:20px;
padding:12px 20px;
font-size:18px;
border:none;
border-radius:8px;
background:#00c3ff;
cursor:pointer;
}

</style>

</head>

<body>

<h1>¡Sobrevivir a la Escuela Marcelino Blanco!</h1>

<div id="video">

<img id="imagen" src="img1.jpg">

<div id="subtitulo">
Presiona iniciar para comenzar el video
</div>

</div>

<button onclick="iniciar()">▶ Iniciar video</button>

<!-- Música de fondo -->
<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

let imagenes=[
"img1.jpg",
"img2.jpg",
"img3.jpg",
"img4.jpg",
"img5.jpg"
];

let textos=[

"Hola chicos, bienvenidos a la escuela Marcelino Blanco. Soy Luciano Sala y estoy aquí para ayudarlos a comenzar este nuevo año.",

"La escuela es como un juego. Tendrán desafíos, harán amigos y aprenderán muchas cosas nuevas.",

"No se preocupen si al principio no saben todo. Eso es parte de estar en primer año.",

"Algunos consejos para sobrevivir: no tengan miedo de preguntar, hagan amigos y trabajen en equipo.",

"Recuerden: la escuela es un lugar para aprender, crecer y divertirse.",

"¡Buena suerte chicos! Vamos a hacer que este año sea inolvidable."
];

let i=0;

function iniciar(){

document.getElementById("musica").volume = 0.3;
document.getElementById("musica").play();

cambiarImagen();

}

function cambiarImagen(){

document.getElementById("imagen").src=imagenes[i];

document.getElementById("subtitulo").innerText=textos[i] || "";

i++;

if(i<imagenes.length){

setTimeout(cambiarImagen,3000);

}

}

</script>

</body>
</html>
