<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ENDEX UI ULTRA</title>

<style>
body {
    margin: 0;
    background: #050505;
    color: #00ffcc;
    font-family: monospace;
    overflow: hidden;
}

/* LOGIN */
#login {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#login input {
    padding: 10px;
    background: black;
    border: 1px solid #00ffcc;
    color: #00ffcc;
}

/* APP */
.container {
    display: none;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #0a0a0a;
    border-right: 1px solid #00ffcc33;
    padding: 10px;
}

.menu-item {
    padding: 8px;
    cursor: pointer;
}

.menu-item:hover {
    background: #00ffcc22;
}

/* MAIN */
.main {
    flex: 1;
    padding: 10px;
}

/* TERMINAL */
.terminal {
    height: 50%;
    overflow-y: auto;
    border: 1px solid #00ffcc33;
    padding: 10px;
}

/* INPUT */
.input-area {
    display: flex;
    margin-top: 5px;
}

input {
    flex: 1;
    background: black;
    border: none;
    color: #00ffcc;
    padding: 10px;
    outline: none;
}

/* PROGRESS */
.progress {
    height: 8px;
    background: #111;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #00ffcc;
}

/* WINDOW */
.window {
    position: absolute;
    top: 50px;
    left: 300px;
    width: 300px;
    height: 200px;
    background: #000;
    border: 1px solid #00ffcc;
    padding: 10px;
}

/* RADAR */
.radar {
    width: 200px;
    height: 200px;
    border: 1px solid #00ffcc;
    border-radius: 50%;
    position: relative;
    margin-top: 10px;
}

.line {
    width: 100%;
    height: 2px;
    background: #00ffcc;
    position: absolute;
    top: 50%;
    transform-origin: left;
    animation: rotate 2s linear infinite;
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* GLITCH */
.glitch {
    color: #ff00ff;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2>ENDEX LOGIN</h2>
    <input type="password" id="pass" placeholder="Enter password">
</div>

<!-- APP -->
<div class="container" id="app">

    <div class="sidebar">
        <div class="menu-item" onclick="runScan()">▶ Scan</div>
        <div class="menu-item" onclick="hack()">▶ Hack</div>
        <div class="menu-item" onclick="openWindow()">▶ Open Window</div>
        <div class="menu-item" onclick="showRadar()">▶ Radar</div>
        <div class="menu-item" onclick="clearTerminal()">▶ Clear</div>
    </div>

    <div class="main">

        <div class="terminal" id="terminal"></div>

        <div class="progress">
            <div class="progress-bar" id="bar"></div>
        </div>

        <div class="input-area">
            <input type="text" id="input" placeholder="Enter command...">
        </div>

        <div id="extra"></div>

    </div>

</div>

<audio id="sound" src="https://www.soundjay.com/mechanical/keyboard-1.mp3"></audio>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("input");
const bar = document.getElementById("bar");
const sound = document.getElementById("sound");

/* LOGIN */
document.getElementById("pass").addEventListener("keydown", e => {
    if (e.key === "Enter") {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "flex";
        print("ACCESS GRANTED ✔");
    }
});

/* TERMINAL */
function print(text, glitch=false) {
    let div = document.createElement("div");
    div.textContent = "> " + text;
    if (glitch) div.classList.add("glitch");
    terminal.appendChild(div);
    terminal.scrollTop = terminal.scrollHeight;
}

/* SOUND */
function typeSound() {
    sound.currentTime = 0;
    sound.play();
}

/* COMMANDS */
input.addEventListener("keydown", e => {
    if (e.key === "Enter") {
        let cmd = input.value;
        print(cmd);
        execute(cmd);
        input.value = "";
    }
});

function execute(cmd) {
    typeSound();

    if (cmd === "scan") runScan();
    else if (cmd === "hack") hack();
    else if (cmd === "radar") showRadar();
    else if (cmd === "window") openWindow();
    else if (cmd === "clear") clearTerminal();
    else if (cmd === "help") {
        print("scan | hack | radar | window | clear");
    }
    else print("ERROR: command not found", true);
}

/* FUNCTIONS */
function runScan() {
    print("Scanning system...");
    animateBar();
}

function hack() {
    print("Bypassing firewall...");
    setTimeout(() => print("Access granted ✔"), 1500);
    animateBar();
}

function clearTerminal() {
    terminal.innerHTML = "";
}

function animateBar() {
    bar.style.width = "0%";
    let progress = 0;

    let interval = setInterval(() => {
        progress += 4;
        bar.style.width = progress + "%";

        if (progress >= 100) {
            clearInterval(interval);
            print("Process completed ✔");
        }
    }, 100);
}

/* WINDOW */
function openWindow() {
    let win = document.createElement("div");
    win.className = "window";
    win.innerHTML = "SYSTEM LOG<br>Accessing data...";
    document.body.appendChild(win);
}

/* RADAR */
function showRadar() {
    let radar = document.createElement("div");
    radar.className = "radar";

    let line = document.createElement("div");
    line.className = "line";

    radar.appendChild(line);
    document.getElementById("extra").appendChild(radar);
}

/* START */
print("ENDEX_UI ULTRA READY");
print("Type 'help'");
</script>

</body>
</html>
