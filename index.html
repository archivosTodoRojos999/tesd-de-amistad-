<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sobrevivir a la Escuela Marcelino Blanco</title>

<style>
body{
font-family: Arial;
background: linear-gradient(135deg,#4facfe,#00f2fe);
text-align:center;
margin:0;
color:white;
}

header{
background:#222;
padding:20px;
}

video{
width:70%;
max-width:700px;
margin-top:20px;
border-radius:12px;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#ffcc00;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#ffaa00;
}
</style>
</head>

<body>

<header>
<h1>¡Sobrevivir a la Escuela Marcelino Blanco!</h1>
<p>Video de bienvenida</p>
</header>

<!-- Video -->
<video controls>
<source src="video.mp4" type="video/mp4">
Tu navegador no soporta video
</video>

<br>

<button onclick="hablar()">▶ Escuchar Presentación</button>

<script>
function hablar(){

let texto = `
Hola chicos, bienvenidos a la escuela Marcelino Blanco.
Soy Luciano Sala y voy a ayudarlos a empezar este nuevo año.

La escuela es como un juego.
Van a encontrar desafíos, nuevos amigos y muchas cosas para aprender.

No tengan miedo de preguntar.
Trabajen en equipo y no se rindan.

Recuerden: la escuela es un lugar para aprender, crecer y divertirse.

Buena suerte chicos.
Vamos a hacer que este año sea inolvidable.
`;

let voz = new SpeechSynthesisUtterance(texto);
voz.lang = "es-ES";

speechSynthesis.speak(voz);

}
</script>

</body>
</html>
