<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Game Layout</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/react-router-dom/umd/react-router-dom.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<!-- BABEL DEBE IR ANTES -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>
<body class="bg-black">

<div id="root"></div>

<script type="text/babel">

const { Link } = ReactRouterDOM;

function createPageUrl(page){
  return "#" + page;
}

function Layout({ children, currentPageName }) {

  const isGame = currentPageName === "RacingGame" || currentPageName === "ZombieGame";

  return (
    <div className="relative w-full h-screen bg-black overflow-hidden">

      {/* Nav bar */}
      <div className="absolute top-0 left-0 right-0 z-50 flex justify-center gap-3 p-2 bg-black/60 backdrop-blur-sm border-b border-white/10">

        <Link
          to={createPageUrl("RacingGame")}
          className={`px-4 py-1.5 text-xs font-bold uppercase tracking-widest rounded transition-all duration-150 ${
            currentPageName === "RacingGame"
              ? "bg-cyan-400 text-black"
              : "text-cyan-400 border border-cyan-400/40 hover:bg-cyan-400/10"
          }`}
        >
          🏎️ Neon Racer
        </Link>

        <Link
          to={createPageUrl("ZombieGame")}
          className={`px-4 py-1.5 text-xs font-bold uppercase tracking-widest rounded transition-all duration-150 ${
            currentPageName === "ZombieGame"
              ? "bg-red-600 text-white"
              : "text-red-400 border border-red-400/40 hover:bg-red-400/10"
          }`}
        >
          🧟 Dead Zone
        </Link>

        <Link
          to={createPageUrl("MinecraftGame")}
          className={`px-4 py-1.5 text-xs font-bold uppercase tracking-widest rounded transition-all duration-150 ${
            currentPageName === "MinecraftGame"
              ? "bg-green-600 text-white"
              : "text-green-400 border border-green-400/40 hover:bg-green-400/10"
          }`}
        >
          ⛏️ VoxelCraft
        </Link>

      </div>

      {/* Page content with top padding for nav */}
      <div className="w-full h-full pt-[38px]">
        {children}
      </div>

    </div>
  );
}

function App(){
  return (
    <Layout currentPageName="RacingGame">
      <div className="text-white text-center mt-20">
        <h1>Game Page</h1>
      </div>
    </Layout>
  )
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
