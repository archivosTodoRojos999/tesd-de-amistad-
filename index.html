<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador Sensi Pro Max DE SALITA</title>
  <style>
    body {
      background: #000;
      color: #00ff00;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      border: 1px solid #00ff00;
      padding: 20px;
      width: 350px;
      box-shadow: 0 0 10px #00ff00;
    }
    input, button {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      background: black;
      color: #00ff00;
      border: 1px solid #00ff00;
    }
    button:hover {
      background: #00ff00;
      color: black;
      cursor: pointer;
    }
    .result {
      margin-top: 15px;
      font-size: 14px;
    }
    .headshot {
      margin-top: 15px;
      border: 1px solid #00ff00;
      padding: 10px;
      text-align: center;
    }
    .error {
      color: red;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>🎯 GENERADOR SENSI PRO MAX DE SALITA</h2>

    <input id="device" placeholder="Ej: Samsung A51, iPhone 11" />
    <button onclick="generate()">GENERAR SENSI</button>

    <div id="error" class="error"></div>
    <div id="result" class="result"></div>
    <div id="headshot" class="headshot"></div>
  </div>

  <script>
    function generate() {
      const device = document.getElementById("device").value.trim();
      const errorEl = document.getElementById("error");
      const resultEl = document.getElementById("result");
      const headshotEl = document.getElementById("headshot");

      if (!device) {
        errorEl.innerText = "Escribe tu dispositivo";
        resultEl.innerHTML = "";
        headshotEl.innerHTML = "";
        return;
      }

      errorEl.innerText = "";

      let hash = 0;
      for (let i = 0; i < device.length; i++) {
        hash = device.charCodeAt(i) + ((hash << 5) - hash);
      }

      const base = Math.abs(hash);

      function calc(min, max, factor) {
        let value = min + (base % factor);
        value = Math.max(min, Math.min(value, max));
        return value;
      }

      const sens = {
        general: calc(120, 200, 80),
        redDot: calc(90, 180, 70),
        x2: calc(80, 170, 60),
        x4: calc(70, 160, 50),
        sniper: calc(60, 150, 40),
        freeLook: calc(100, 200, 100)
      };

      resultEl.innerHTML = `
        GENERAL: ${sens.general}<br>
        PUNTO ROJO: ${sens.redDot}<br>
        MIRA X2: ${sens.x2}<br>
        MIRA X4: ${sens.x4}<br>
        FRANCOTIRADOR: ${sens.sniper}<br>
        CAMARA 360: ${sens.freeLook}
      `;

      let precision = Math.floor((sens.general + sens.redDot + sens.freeLook) / 5);
      if (precision < 99) precision = 100;
      if (precision > 100) precision = 100;

      headshotEl.innerHTML = `🎯 HEADSHOT PRECISION: ${precision}%`;
    }
  </script>
</body>
</html>
