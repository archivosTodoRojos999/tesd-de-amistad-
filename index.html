<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cienpiés Neon</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
}
canvas{
display:block;
}
</style>

</head>
<body>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouse = {x:canvas.width/2,y:canvas.height/2};

document.addEventListener("mousemove",e=>{
mouse.x = e.clientX;
mouse.y = e.clientY;
});

const segmentos = 80;
let body = [];

for(let i=0;i<segmentos;i++){
body.push({x:canvas.width/2,y:canvas.height/2});
}

let hue = 0;

function update(){

body[0].x += (mouse.x-body[0].x)*0.2;
body[0].y += (mouse.y-body[0].y)*0.2;

for(let i=1;i<body.length;i++){

body[i].x += (body[i-1].x-body[i].x)*0.35;
body[i].y += (body[i-1].y-body[i].y)*0.35;

}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

hue += 1;

let color = `hsl(${hue},100%,50%)`;

ctx.strokeStyle = color;
ctx.shadowColor = color;
ctx.shadowBlur = 10;
ctx.lineWidth = 2;

for(let i=0;i<body.length;i++){

let p = body[i];

ctx.beginPath();
ctx.arc(p.x,p.y,4,0,Math.PI*2);
ctx.stroke();

if(i>0){

let prev = body[i-1];

ctx.beginPath();
ctx.moveTo(prev.x,prev.y);
ctx.lineTo(p.x,p.y);
ctx.stroke();

}

if(i%2==0){

let angle = Math.atan2(
body[i-1]?.y - p.y || 0,
body[i-1]?.x - p.x || 0
);

let len = 20;

let lx = p.x + Math.cos(angle+Math.PI/2)*len;
let ly = p.y + Math.sin(angle+Math.PI/2)*len;

let rx = p.x + Math.cos(angle-Math.PI/2)*len;
let ry = p.y + Math.sin(angle-Math.PI/2)*len;

ctx.beginPath();
ctx.moveTo(p.x,p.y);
ctx.lineTo(lx,ly);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(p.x,p.y);
ctx.lineTo(rx,ry);
ctx.stroke();

}

}

}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
