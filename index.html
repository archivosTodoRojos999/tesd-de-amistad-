
<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">

<!-- 🔒 BLOQUEO TOTAL DE ZOOM REAL -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>SENCI PRO DE SALITA 2.0</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial;
color:white;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
touch-action:none; /* bloquea zoom táctil */
}

/* 🔥 FONDO */
body::before{
content:"";
position:fixed;
width:100%;height:100%;
background:
radial-gradient(circle at 20% 30%, rgba(255,0,0,0.3), transparent 40%),
linear-gradient(120deg,#000,#050000,#000);
z-index:-1;
}

/* 📦 CONTENEDOR */
.container{
max-width:320px;
width:95%;
padding:10px;
border-radius:20px;
background:rgba(10,0,0,0.9);
box-shadow:0 0 20px red;
overflow:hidden;
}

/* 🔤 TEXTO AJUSTADO */
h1{
font-size:14px;
text-align:center;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* 🔘 TABS */
.tabs{
display:flex;
gap:4px;
margin:8px 0;
}

.tab{
flex:1;
padding:6px;
font-size:10px;
text-align:center;
background:#111;
border-radius:8px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.tab.active{
background:red;
}

/* INPUT */
input{
width:100%;
padding:5px;
margin:3px 0;
border-radius:8px;
border:none;
background:#111;
color:white;
font-size:10px;
text-align:center;
}

/* BOX */
.box{
padding:8px;
border-radius:12px;
border:1px solid red;
}

/* FILAS */
.row{
margin:6px 0;
}

.label{
display:flex;
justify-content:space-between;
font-size:10px;
white-space:nowrap;
overflow:hidden;
}

/* 🔢 NUMEROS */
.label span{
max-width:50px;
overflow:hidden;
text-overflow:ellipsis;
}

/* BARRAS */
input[type=range]{
pointer-events:none;
opacity:0.3;
}

/* FOOTER */
.footer{
font-size:9px;
text-align:center;
margin-top:5px;
}

/* 📱 RESPONSIVE */
@media (max-width:600px){
.container{
width:95%;
}
}
</style>
</head>

<body>

<div class="container">

<h1>SENCI PRO DE SALITA 2.0</h1>

<!-- 🔥 OPCIONES COMPLETAS RESTAURADAS -->
<div class="tabs">
<div class="tab active" onclick="setTab(this,'normal')">NORMAL</div>
<div class="tab" onclick="setTab(this,'premium')">ALTA</div>
<div class="tab" onclick="setTab(this,'inspirada')">MEDIA</div>
</div>

<input id="marca" placeholder="MARCA" oninput="calcular()">
<input id="modelo" placeholder="MODELO" oninput="calcular()">

<div class="box">

<div class="row">
<div class="label">GENERAL <span id="general">0</span></div>
<input type="range" disabled>
</div>

<div class="row">
<div class="label">MIRA DE PUNTO ROJO <span id="red">0</span></div>
<input type="range" disabled>
</div>

<div class="row">
<div class="label">MIRA 2X <span id="x2">0</span></div>
<input type="range" disabled>
</div>

<div class="row">
<div class="label">MIRA 4X <span id="x4">0</span></div>
<input type="range" disabled>
</div>

<div class="row">
<div class="label">MIRA FRANCOTIRADOR <span id="awm">0</span></div>
<input type="range" disabled>
</div>

<div class="row">
<div class="label">BOTON DE CAMARA 360º <span id="boton">0</span></div>
<input type="range" disabled>
</div>

</div>

<div class="row">
<div class="label">DPI <span id="dpi">0</span></div>
</div>

<div class="footer">SENSI AUTO CALIBRADA</div>

</div>

<script>
// 🔒 EXTRA BLOQUEO ZOOM (doble toque y gesto)
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('dblclick', e => e.preventDefault());

let tipoActual="normal";

function setTab(btn,tipo){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
btn.classList.add('active');
tipoActual=tipo;
calcular();
}

function calcular(){

let texto=(document.getElementById('marca').value||"")+(document.getElementById('modelo').value||"");

let base=0;
for(let i=0;i<texto.length;i++){
base+=texto.charCodeAt(i)*(i+2);
}

base=(base%40)+20;

let mult=1;
if(tipoActual==="premium") mult=1.10;
if(tipoActual==="inspirada") mult=0.95;

let micro=(texto.length*3)%8;

let sens={
general:Math.floor((120+base+micro)*mult),
red:Math.floor((110+base+micro)*mult),
x2:Math.floor((95+base)*mult),
x4:Math.floor((130+base)*mult),
awm:Math.floor((100+base)*mult),
boton:Math.floor((50+base)*mult)
};

function suavizar(v){return Math.floor(v*0.97);}
for(let k in sens){sens[k]=suavizar(sens[k]);}

function limitar(v,max){return Math.max(1,Math.min(v,max));}

sens.general=limitar(sens.general,200);
sens.red=limitar(sens.red,200);
sens.x2=limitar(sens.x2,200);
sens.x4=limitar(sens.x4,200);
sens.awm=limitar(sens.awm,200);
sens.boton=limitar(sens.boton,100);

for(let k in sens){
document.getElementById(k).innerText=sens[k];
}

let dpi=400+(base*2);
dpi=Math.max(400,Math.min(dpi,600));
document.getElementById('dpi').innerText=dpi;

}
</script>

</body>
</html>
```
