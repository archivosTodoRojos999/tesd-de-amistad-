<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Terminal Hack</title>

<style>

body{
margin:0;
background:black;
color:#00ff9c;
font-family:monospace;
overflow:hidden;
}

canvas{
position:absolute;
top:0;
left:0;
}

#terminal{
position:absolute;
bottom:20px;
left:20px;
font-size:18px;
width:90%;
}

#panel{
display:none;
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:#00ff9c;
text-align:center;
padding-top:20vh;
font-size:40px;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="terminal"></div>

<div id="panel">
⚠ ACCESS GRANTED ⚠
<br><br>
GLOBAL NETWORK CONTROL
</div>

<script>

// MATRIX CODE RAIN

const canvas = document.getElementById("matrix")
const ctx = canvas.getContext("2d")

canvas.height = window.innerHeight
canvas.width = window.innerWidth

const letters = "01アカサタナハマヤラワABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&"
const fontSize = 16
const columns = canvas.width / fontSize

const drops = []

for(let i=0;i<columns;i++){
drops[i]=1
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00ff9c"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

const text = letters.charAt(Math.floor(Math.random()*letters.length))

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize > canvas.height && Math.random()>0.975){
drops[i]=0
}

drops[i]++

}

}

setInterval(draw,35)


// TERMINAL TEXT

const terminal = document.getElementById("terminal")

const lines = [
"Connecting to remote server...",
"Bypassing firewall...",
"Injecting payload...",
"Decrypting security layer...",
"Accessing private database...",
"Downloading files...",
"Removing traces...",
"Finalizing connection..."
]

let lineIndex = 0
let charIndex = 0

function typeLine(){

if(lineIndex >= lines.length){

setTimeout(()=>{
document.getElementById("panel").style.display="block"
},2000)

return
}

let currentLine = lines[lineIndex]

terminal.innerHTML += currentLine.charAt(charIndex)

charIndex++

clickSound()

if(charIndex < currentLine.length){

setTimeout(typeLine,40)

}else{

terminal.innerHTML += "<br>"

lineIndex++
charIndex=0

setTimeout(typeLine,500)

}

}

setTimeout(typeLine,2000)


// TERMINAL SOUND

const audioCtx = new (window.AudioContext || window.webkitAudioContext)()

function clickSound(){

const osc = audioCtx.createOscillator()
const gain = audioCtx.createGain()

osc.frequency.value = 200 + Math.random()*400

osc.connect(gain)
gain.connect(audioCtx.destination)

gain.gain.value = 0.02

osc.start()
osc.stop(audioCtx.currentTime+0.02)

}

</script>

</body>
</html>
